services:
  - type: web
    name: polla-infinito-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w backend && npm run db:migrate -w backend
    startCommand: npm run start -w backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: polla-infinito-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: polla-infinito-db
    plan: free
    databaseName: polla_infinito
    user: polla_infinito
